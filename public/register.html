<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="register-bg">

<div class="box">
  <h2>Create Account</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Create Password">

  <button class="register-btn" onclick="register()">Register</button>

  <p id="msg"></p>

  <p>
    Already have account? <a href="login.html">Login</a>
  </p>
</div>

<script>
async function register() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    document.getElementById("msg").innerText = "Fill all fields";
    return;
  }

  const res = await fetch("/api/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (res.ok) {
    document.getElementById("msg").style.color = "green";
    document.getElementById("msg").innerText = "Registered successfully!";
    setTimeout(() => {
      window.location = "login.html";
    }, 1000);
  } else {
    document.getElementById("msg").innerText = data.msg;
  }
}
</script>

</body>
</html>
